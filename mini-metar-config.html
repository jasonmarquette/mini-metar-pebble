<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>Mini METAR Settings</title>

  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #222;
    }

    .card {
      max-width: 420px;
      margin: 0 auto;
      padding: 24px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 24px;
      font-size: 24px;
    }

    h2 {
      margin-top: 26px;
      margin-bottom: 10px;
      font-size: 18px;
    }

    label {
      display: block;
      margin-top: 18px;
      margin-bottom: 8px;
      font-weight: bold;
    }

    input,
    select {
      box-sizing: border-box;
      width: 100%;
      padding: 12px;
      font-size: 18px;
      border: 1px solid #bbb;
      border-radius: 6px;
      background: #fff;
    }

    input {
      text-transform: uppercase;
    }

    button {
      box-sizing: border-box;
      width: 100%;
      margin-top: 24px;
      padding: 12px;
      font-size: 18px;
      font-weight: bold;
      border: 0;
      border-radius: 6px;
      background: #222;
      color: #fff;
      cursor: pointer;
    }

    button:active {
      opacity: 0.8;
    }

    .secondary-button {
      margin-top: 12px;
      background: #e5e5e5;
      color: #222;
      border: 1px solid #bbb;
    }

    .hint {
      margin-top: 8px;
      font-size: 14px;
      color: #666;
    }

    .saved-airports {
      margin-top: 12px;
    }

    .saved-airport-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    .airport-select-button {
      flex: 1;
      width: auto;
      margin: 0;
      padding: 10px 12px;
      text-align: left;
      font-size: 17px;
      background: #f1f1f1;
      color: #222;
      border: 1px solid #bbb;
    }

    .airport-delete-button {
      flex: 0 0 auto;
      width: auto;
      margin: 0;
      padding: 10px 12px;
      font-size: 15px;
      background: #9d1c1c;
      color: #fff;
    }

    .empty-message {
      margin-top: 10px;
      padding: 12px;
      font-size: 14px;
      color: #666;
      background: #f5f5f5;
      border-radius: 6px;
    }

    .status {
      min-height: 18px;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Mini METAR Settings</h1>

    <label for="airport">ICAO Airport Code</label>

    <input
      id="airport"
      type="text"
      maxlength="4"
      placeholder="KCXO"
      autocomplete="off"
    >

    <div class="hint">
      Enter a 3- or 4-character airport identifier.
    </div>

    <button
      id="save-airport-button"
      class="secondary-button"
      type="button"
    >
      Add to Saved Airports
    </button>

    <h2>Saved Airports</h2>

    <div class="hint">
      Tap an airport to select it.
    </div>

    <div
      id="saved-airports"
      class="saved-airports"
    ></div>

    <label for="temperature-unit">
      Temperature Unit
    </label>

    <select id="temperature-unit">
      <option value="fahrenheit">
        Fahrenheit (°F)
      </option>

      <option value="celsius">
        Celsius (°C)
      </option>
    </select>

    <label for="pressure-unit">
      Pressure Unit
    </label>

    <select id="pressure-unit">
      <option value="inhg">
        Inches of Mercury (inHg)
      </option>

      <option value="hpa">
        Hectopascals (hPa)
      </option>
    </select>

    <button id="save-button" type="button">
      Save Settings
    </button>

    <div
      id="status"
      class="hint status"
    ></div>
  </div>

  <script>
    var savedAirportsStorageKey =
      'miniMetarSavedAirports';

    var maximumSavedAirports = 10;

    function getQueryParameter(name) {
      var query = window.location.search.substring(1);
      var parts = query.split('&');

      for (var i = 0; i < parts.length; i++) {
        var pair = parts[i].split('=');
        var key = decodeURIComponent(pair[0] || '');

        if (key === name) {
          return decodeURIComponent(
            (pair[1] || '').replace(/\+/g, ' ')
          );
        }
      }

      return null;
    }

    function getAirportInput() {
      return document
        .getElementById('airport')
        .value
        .replace(/^\s+|\s+$/g, '')
        .toUpperCase();
    }

    function isValidAirport(airport) {
      return /^[A-Z0-9]{3,4}$/.test(airport);
    }

    function setStatus(message) {
      document.getElementById('status').innerHTML =
        message;
    }

    function loadSavedAirports() {
      try {
        var storedValue = localStorage.getItem(
          savedAirportsStorageKey
        );

        if (!storedValue) {
          return [];
        }

        var airports = JSON.parse(storedValue);

        if (!airports || !airports.length) {
          return [];
        }

        return airports;
      } catch (error) {
        return [];
      }
    }

    function storeSavedAirports(airports) {
      try {
        localStorage.setItem(
          savedAirportsStorageKey,
          JSON.stringify(airports)
        );

        return true;
      } catch (error) {
        alert(
          'Saved airports could not be stored on this device.'
        );

        return false;
      }
    }

    function selectSavedAirport(airport) {
      document.getElementById('airport').value =
        airport;

      setStatus(
        airport +
        ' selected. Press Save Settings to update the watch.'
      );
    }

    function deleteSavedAirport(airport) {
      var airports = loadSavedAirports();
      var updatedAirports = [];

      for (var i = 0; i < airports.length; i++) {
        if (airports[i] !== airport) {
          updatedAirports.push(airports[i]);
        }
      }

      if (storeSavedAirports(updatedAirports)) {
        renderSavedAirports();

        setStatus(
          airport + ' removed from saved airports.'
        );
      }
    }

    function createSavedAirportRow(airport) {
      var row = document.createElement('div');
      row.className = 'saved-airport-row';

      var selectButton =
        document.createElement('button');

      selectButton.type = 'button';
      selectButton.className =
        'airport-select-button';

      selectButton.appendChild(
        document.createTextNode(airport)
      );

      selectButton.onclick = function() {
        selectSavedAirport(airport);
      };

      var deleteButton =
        document.createElement('button');

      deleteButton.type = 'button';
      deleteButton.className =
        'airport-delete-button';

      deleteButton.appendChild(
        document.createTextNode('Delete')
      );

      deleteButton.onclick = function() {
        deleteSavedAirport(airport);
      };

      row.appendChild(selectButton);
      row.appendChild(deleteButton);

      return row;
    }

    function renderSavedAirports() {
      var container =
        document.getElementById('saved-airports');

      var airports = loadSavedAirports();

      while (container.firstChild) {
        container.removeChild(container.firstChild);
      }

      if (airports.length === 0) {
        var emptyMessage =
          document.createElement('div');

        emptyMessage.className = 'empty-message';

        emptyMessage.appendChild(
          document.createTextNode(
            'No airports have been saved yet.'
          )
        );

        container.appendChild(emptyMessage);
        return;
      }

      for (var i = 0; i < airports.length; i++) {
        container.appendChild(
          createSavedAirportRow(airports[i])
        );
      }
    }

    function addSavedAirport() {
      var airport = getAirportInput();

      if (!isValidAirport(airport)) {
        alert(
          'Enter a valid 3- or 4-character airport code.'
        );

        return;
      }

      var airports = loadSavedAirports();

      for (var i = 0; i < airports.length; i++) {
        if (airports[i] === airport) {
          setStatus(
            airport + ' is already in saved airports.'
          );

          return;
        }
      }

      if (airports.length >= maximumSavedAirports) {
        alert(
          'You can save up to ' +
          maximumSavedAirports +
          ' airports. Delete one before adding another.'
        );

        return;
      }

      airports.push(airport);

      airports.sort();

      if (storeSavedAirports(airports)) {
        renderSavedAirports();

        setStatus(
          airport + ' added to saved airports.'
        );
      }
    }

    var returnTo =
      getQueryParameter('return_to') ||
      'pebblejs://close#';

    var currentAirport =
      getQueryParameter('airport') || 'KCXO';

    var useCelsius =
      getQueryParameter('useCelsius') === '1';

    var useHpa =
      getQueryParameter('useHpa') === '1';

    document.getElementById('airport').value =
      currentAirport.toUpperCase();

    document.getElementById(
      'temperature-unit'
    ).value =
      useCelsius ? 'celsius' : 'fahrenheit';

    document.getElementById(
      'pressure-unit'
    ).value =
      useHpa ? 'hpa' : 'inhg';

    function saveSettings() {
      var airport = getAirportInput();

      var temperatureUnit = document
        .getElementById('temperature-unit')
        .value;

      var pressureUnit = document
        .getElementById('pressure-unit')
        .value;

      if (!isValidAirport(airport)) {
        alert(
          'Enter a valid 3- or 4-character airport code.'
        );

        setStatus('');
        return;
      }

      var settings = {
        airport: airport,
        useCelsius:
          temperatureUnit === 'celsius',
        useHpa:
          pressureUnit === 'hpa'
      };

      document.location =
        returnTo +
        encodeURIComponent(
          JSON.stringify(settings)
        );
    }

    document
      .getElementById('save-airport-button')
      .addEventListener('click', function() {
        addSavedAirport();
      });

    document
      .getElementById('save-button')
      .addEventListener('click', function() {
        setStatus('Saving settings...');

        saveSettings();
      });

    renderSavedAirports();
  </script>
</body>
</html>
